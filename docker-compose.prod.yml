services:
  postgres:
    image: postgres:15-alpine
    container_name: bronisport_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bronisport}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-bronisport}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bronisport} -d ${DB_NAME:-bronisport}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bronisport_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bronisport}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-bronisport}?schema=public
      PORT: "4000"
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-BroniSport <onboarding@resend.dev>}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?set VITE_API_URL}
    container_name: bronisport_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  uploads:
